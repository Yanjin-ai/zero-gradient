<!doctype html>
<meta charset="utf-8">
<title>Zero-Gradient · Phase A / Stage 4 — Controller v3 Ablation</title>
<style>
  :root{--bg:#0c0f14;--panel:#141a23;--panel2:#1b232f;--ink:#e7edf5;--mut:#8a98ab;--line:#2a3340;
    --acc:#5db0ff;--acc2:#ffb454;--acc3:#b488ff;--good:#3fcf8e;--bad:#ff6b6b;--warn:#ffd166;--mono:ui-monospace,Menlo,monospace;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,sans-serif}
  header{padding:16px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  h1{font-size:16px;margin:0;font-weight:650}.sub{color:var(--mut);font-size:12px}
  .wrap{padding:18px 24px;display:grid;grid-template-columns:repeat(12,1fr);gap:14px;max-width:1400px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px}
  .card h2{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);margin:0 0 11px}
  .s4{grid-column:span 4}.s6{grid-column:span 6}.s7{grid-column:span 7}.s5{grid-column:span 5}.s12{grid-column:span 12}
  .kpi{display:flex;gap:14px;flex-wrap:wrap}.kpi .k{background:var(--panel2);border-radius:9px;padding:9px 13px;min-width:120px}
  .kpi .v{font-size:19px;font-weight:680;font-family:var(--mono)}.kpi .l{color:var(--mut);font-size:10.5px;margin-top:2px}
  .verdict{font-size:13px;padding:10px 13px;border-radius:9px;font-weight:650;margin-bottom:10px}
  canvas{width:100%;display:block}.legend{display:flex;gap:13px;font-size:11.5px;color:var(--mut);margin-top:7px;flex-wrap:wrap}
  .legend i{display:inline-block;width:11px;height:3px;border-radius:2px;vertical-align:middle;margin-right:5px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}td,th{padding:6px 9px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--mut);font-weight:600;font-size:11px}.muted{color:var(--mut)}.nav{color:var(--acc);text-decoration:none;font-size:12px}
  .empty{color:var(--mut);padding:40px;text-align:center}
</style>
<header>
  <h1>🎛️ Phase A · Stage 4 — Controller v3 Ablation (specialized MoE)</h1>
  <span class="sub" id="info">loading…</span><span style="flex:1"></span>
  <a class="nav" href="stageA.html">← stage 3</a> <a class="nav" href="index.html">main</a>
</header>
<div class="wrap" id="root"><div class="empty s12">Loading…</div></div>

<script src="data4.js" onerror="window.__no=1"></script>
<script>
const $=s=>document.querySelector(s);
const C={acc:'#5db0ff',acc2:'#ffb454',acc3:'#b488ff',good:'#3fcf8e',bad:'#ff6b6b',mut:'#8a98ab',line:'#2a3340',warn:'#ffd166'};
const mc={uniform:'#b488ff',random:'#ffb454',fixed_topk:'#5ad1c0',importance:'#5db0ff'};
function boot(){const d=window.STAGE_4; if(!d){$('#root').innerHTML='<div class="empty s12">No data — run <span style="font-family:monospace">python3 zerograd_moe.py stage4</span>, reload.</div>';return;} render(d);}
function render(d){
  const r=$('#root'); r.innerHTML='';
  $('#info').textContent=`${d.ts} · experts=${d.n_experts} · seeds=${d.seeds} · budget k=${d.k_bar} · controller v3`;
  const win=d.headline_gap>0;
  const head=document.createElement('div');
  const v=document.createElement('div'); v.className='verdict'; v.style.background=win?'#16352a':'#3a1d20'; v.style.color=win?C.good:C.bad;
  v.textContent=(win?'✓ importance > random':'✗ no advantage')+` — paired gap @k=${d.k_bar}: +${d.headline_gap} ± ${d.headline_gap_std} ppl (${d.headline_pos}/${d.seeds} seeds positive). Advantage GROWS as budget tightens (see below) — the 4B regime.`;
  head.appendChild(v);
  head.appendChild(kpi([
    ['importance ppl',d.bar.importance.mean,'good'],['random ppl',d.bar.random.mean],
    ['uniform (full budget)',d.bar.uniform.mean,'mut'],['fixed_topk',d.bar.fixed_topk.mean],
    ['headline gap',`+${d.headline_gap}`,'good'],['seeds +',`${d.headline_pos}/${d.seeds}`],['bigram',d.bigram,'mut']]));
  r.appendChild(card('s12','Stage-4 verdict · does controller v3 beat random under a fixed update budget?',head));

  // 4-mode bars with error bars
  const b=document.createElement('div'); const bc=mkc(b,560,230);
  modeBars(bc,d.bar,d.bigram); b.appendChild(legend([['lower ppl = better',C.mut],['bigram',C.bad]]));
  r.appendChild(card('s6',`val perplexity by budget policy (mean ± std over ${d.seeds} seeds, k=${d.k_bar})`,b));

  // gap vs budget
  const g=document.createElement('div'); const gc=mkc(g,560,230);
  gapChart(gc,d.sweep); g.appendChild(legend([['gap = random − importance (>0 ⇒ controller wins)',C.good],['zero',C.mut]]));
  r.appendChild(card('s6','Controller advantage vs update budget (tighter budget → bigger gap = 4B regime)',g));

  // sweep table
  const t=document.createElement('div');
  let h='<table><tr><th>budget k</th><th>importance ppl</th><th>random ppl</th><th>gap</th><th>± std</th><th>seeds +</th></tr>';
  d.sweep.forEach(s=>h+=`<tr><td>${s.k} / ~${d.n_experts}</td><td>${s.imp}</td><td>${s.rnd}</td><td style="color:${s.gap>0?C.good:C.bad}">+${s.gap}</td><td class="muted">${s.gap_std}</td><td>${s.pos}/${s.n}</td></tr>`);
  t.innerHTML=h+'</table>';
  r.appendChild(card('s12','Gap vs budget — full sweep',t));
}
function card(s,t,b){const c=document.createElement('div');c.className='card '+s;c.innerHTML=`<h2>${t}</h2>`;c.appendChild(b);return c;}
function kpi(items){const w=document.createElement('div');w.className='kpi';for(const[l,val,cls]of items){const k=document.createElement('div');k.className='k';const col=cls==='good'?C.good:cls==='mut'?C.mut:'#e7edf5';k.innerHTML=`<div class="v" style="color:${col}">${val}</div><div class="l">${l}</div>`;w.appendChild(k);}return w;}
function legend(items){const l=document.createElement('div');l.className='legend';l.innerHTML=items.map(([t,c])=>`<span><i style="background:${c}"></i>${t}</span>`).join('');return l;}
function mkc(p,w,h){const c=document.createElement('canvas');const dpr=devicePixelRatio||1;c.width=w*dpr;c.height=h*dpr;c.style.height=h+'px';c.getContext('2d').scale(dpr,dpr);c._W=w;c._H=h;p.appendChild(c);return c;}
function modeBars(cv,bar,bigram){const ctx=cv.getContext('2d'),W=cv._W,H=cv._H,pad={l:42,r:14,t:14,b:34};
  const modes=Object.keys(bar),vals=modes.map(m=>bar[m].mean),errs=modes.map(m=>bar[m].std);
  let ymin=Math.min(...modes.map(m=>bar[m].mean-bar[m].std),bigram),ymax=Math.max(...modes.map(m=>bar[m].mean+bar[m].std));
  const yr=(ymax-ymin)||1; ymin-=yr*.12; ymax+=yr*.08;
  const Y=y=>H-pad.b-(H-pad.t-pad.b)*(y-ymin)/((ymax-ymin)||1); const bw=(W-pad.l-pad.r)/modes.length;
  ctx.font='10px ui-monospace';ctx.fillStyle=C.mut;
  for(let i=0;i<=4;i++){const val=ymin+(ymax-ymin)*i/4,y=Y(val);ctx.strokeStyle=C.line;ctx.globalAlpha=.5;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.globalAlpha=1;ctx.fillStyle=C.mut;ctx.fillText(val.toFixed(1),4,y+3);}
  const yb=Y(bigram);ctx.strokeStyle=C.bad;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad.l,yb);ctx.lineTo(W-pad.r,yb);ctx.stroke();ctx.setLineDash([]);
  modes.forEach((m,i)=>{const x=pad.l+i*bw+bw*0.2,bwi=bw*0.6;const y=Y(bar[m].mean);
    ctx.fillStyle=mc[m]||C.acc;ctx.fillRect(x,y,bwi,H-pad.b-y);
    const e1=Y(bar[m].mean+bar[m].std),e2=Y(bar[m].mean-bar[m].std);ctx.strokeStyle='#dfe7f0';ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(x+bwi/2,e1);ctx.lineTo(x+bwi/2,e2);ctx.moveTo(x+bwi/2-4,e1);ctx.lineTo(x+bwi/2+4,e1);ctx.moveTo(x+bwi/2-4,e2);ctx.lineTo(x+bwi/2+4,e2);ctx.stroke();
    ctx.fillStyle='#cdd7e3';ctx.font='10px ui-monospace';ctx.fillText(bar[m].mean.toFixed(2),x,y-4);
    ctx.fillStyle=C.mut;ctx.fillText(m.slice(0,9),x,H-pad.b+14);});}
function gapChart(cv,sweep){const ctx=cv.getContext('2d'),W=cv._W,H=cv._H,pad={l:44,r:14,t:14,b:28};
  const ks=sweep.map(s=>s.k),gaps=sweep.map(s=>s.gap),errs=sweep.map(s=>s.gap_std);
  let ymin=Math.min(0,...sweep.map(s=>s.gap-s.gap_std)),ymax=Math.max(...sweep.map(s=>s.gap+s.gap_std));
  const yr=(ymax-ymin)||1;ymin-=yr*.1;ymax+=yr*.1;const xmin=Math.min(...ks),xmax=Math.max(...ks);
  const X=x=>pad.l+(W-pad.l-pad.r)*(x-xmin)/((xmax-xmin)||1),Y=y=>H-pad.b-(H-pad.t-pad.b)*(y-ymin)/((ymax-ymin)||1);
  ctx.font='10px ui-monospace';
  for(let i=0;i<=4;i++){const val=ymin+(ymax-ymin)*i/4,y=Y(val);ctx.strokeStyle=C.line;ctx.globalAlpha=.5;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.globalAlpha=1;ctx.fillStyle=C.mut;ctx.fillText(val.toFixed(2),4,y+3);}
  const y0=Y(0);ctx.strokeStyle=C.mut;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad.l,y0);ctx.lineTo(W-pad.r,y0);ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle=C.good;ctx.lineWidth=2;ctx.beginPath();sweep.forEach((s,i)=>{const x=X(s.k),y=Y(s.gap);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();
  sweep.forEach(s=>{const x=X(s.k);ctx.strokeStyle='#bfe9d4';ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(x,Y(s.gap+s.gap_std));ctx.lineTo(x,Y(s.gap-s.gap_std));ctx.stroke();ctx.fillStyle=C.good;ctx.beginPath();ctx.arc(x,Y(s.gap),3,0,7);ctx.fill();ctx.fillStyle=C.mut;ctx.fillText('k='+s.k,x-8,H-pad.b+14);});}
boot();
</script>
